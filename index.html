<!DOCTYPE html> 
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Relax&Study</title>
    <!-- add the font family of your choice -->
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <!-- Header Section -->
    <header>
      <h1>Media Player Website</h1>
    </header>
    <!-- Navigation Section -->
    <nav>
      <ul>
        <li><a href="#">Relax</a></li>
        <li><a href="#">Study</a></li>
        <!-- Add or remove navigation items as needed -->
         <!--Removed additional items, only keep Relax and Study-->
      </ul>
    </nav>
    <!-- Main Content Section -->
    <main class="container">
      <!--The visual system-->
      <canvas id ="visual-canvas"></canvas>










      <!-- Media Player Section -->
<!-- 
Video section is commented out and is now replaced with audio and different visuals instead.

<!--This is the audio section, storing and linking the audio file.-->
      <div class="media-player">
        <audio id="custom-audio-player">
          <!--LINK TO THE AUDIO-->
          <source
            src="https://thelongesthumstore.sgp1.cdn.digitaloceanspaces.com/IM-2250/erokia_ambient-wave-56-msfxp7-78.mp3"
            type="audio/mpeg"
            />
        <!--audio/mpeg instead of mp3 communicates the file more clearly, fixing MIME type file.-->
        </audio>
<!--custom controls-->
          <!--play button that aligns with audio/video-->
        <div class="custom-controls">
          <button id="play-pause-btn" onclick="togglePlayPause()">
            <img
              id="play-pause-img"
              src="https://img.icons8.com/ios-glyphs/30/play--v1.png"
              alt="Play Button"
              width="24"
              height="24"/>
          </button>
            <!--Progress bar is here-->
          <div class="progress-bar" onclick="clickProgressBar(event)">
            <span id="progress-bar-fill"></span>
          </div>
        </div>
      </div>

      
      <!-- Additional Content Section -->
    </main>
